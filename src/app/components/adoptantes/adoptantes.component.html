<h2>Adoptantes</h2>

<div class="tabs">
  <button (click)="tab='lista'">Lista</button>
  <button (click)="tab='formulario'">Formulario</button>
</div>

<!-- Lista -->
<div *ngIf="tab==='lista'">
  <input type="text" [(ngModel)]="filtro" placeholder="Buscar adoptante..." />
  <ul>
    <li *ngFor="let a of adoptantesFiltrados">
      <strong>{{ a.nombre }}</strong> - {{ a.telefono }}
    </li>
  </ul>
</div>

<!-- Formulario -->
<div *ngIf="tab==='formulario'">
  <form [formGroup]="form" (ngSubmit)="agregarAdoptante()">
    <input formControlName="nombre" placeholder="Nombre del adoptante" />
    <input formControlName="telefono" placeholder="Teléfono" />
    <button type="submit">Agregar</button>
  </form>
</div>
